version: "3.8"

services:
  media-server:
    image: nginx:alpine
    container_name: media-server
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./media:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  ftp-server:
    image: fauria/vsftpd
    container_name: ftp-server
    restart: unless-stopped
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      - FTP_USER=media
      - FTP_PASS=media123
      - PASV_ADDRESS=204.168.133.31
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
      - LOG_STDOUT=YES
    volumes:
      - ./media:/home/vsftpd/media
