server {
    listen 80;
    server_name _;

    # Serve media files with directory listing
    location / {
        root /usr/share/nginx/html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        autoindex_format html;

        # Enable range requests for seeking in VLC
        add_header Accept-Ranges bytes;

        # CORS headers so VLC and other players can access
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";

        # Proper MIME types for common media
        types {
            video/mp4                     mp4;
            video/x-matroska              mkv;
            video/webm                    webm;
            video/x-msvideo               avi;
            video/x-flv                   flv;
            video/quicktime               mov;
            audio/mpeg                    mp3;
            audio/ogg                     ogg;
            audio/flac                    flac;
            audio/x-wav                   wav;
            application/x-subrip          srt;
            text/vtt                      vtt;
            image/jpeg                    jpg jpeg;
            image/png                     png;
        }
    }
}
